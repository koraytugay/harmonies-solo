<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harmonies Solo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Harmonies Solo</h1>
            <button id="restartBtn" class="btn btn-restart">Restart</button>
        </div>

        <div class="token-count-display" id="tokenCountDisplay">120 tokens remaining</div>

        <div class="groups-container" id="groupsContainer">
            <div class="group" data-group="1">
                <div class="group-tokens"></div>
            </div>
            <div class="group" data-group="2">
                <div class="group-tokens"></div>
            </div>
            <div class="group" data-group="3">
                <div class="group-tokens"></div>
            </div>
        </div>

        <div class="controls">
            <button id="drawBtn" class="btn btn-draw">Draw New Selection</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
