<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harmonies Solo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="groups-container" id="groupsContainer">
            <div class="group" data-group="1">
                <div class="group-tokens"></div>
            </div>
            <div class="group" data-group="2">
                <div class="group-tokens"></div>
            </div>
            <div class="group" data-group="3">
                <div class="group-tokens"></div>
            </div>
        </div>

        <div class="token-bar-container">
            <div class="token-bar" id="tokenBar"></div>
        </div>

        <div id="toast" class="toast">
            <div class="toast-content">
                <p>Press <strong>Enter</strong> and have fun.</p>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
