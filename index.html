<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harmonies Solo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Harmonies Solo</h1>
            <button id="restartBtn" class="btn btn-restart">Restart Game</button>
        </div>

        <div class="token-counter">
            <h2>Tokens Remaining</h2>
            <div id="tokenCounts"></div>
        </div>

        <div class="token-groups" id="tokenGroups"></div>

        <div class="controls">
            <button id="discardBtn" class="btn btn-primary">Discard & Draw New</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
